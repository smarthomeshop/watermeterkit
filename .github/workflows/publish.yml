name: Build and Publish WaterMeterKit firmware

on:
  pull_request:
  workflow_dispatch:
    inputs:
      force_all:
        description: "Force build all versions"
        required: false
        type: boolean
        default: false
  # Scheduled build: rebuild all firmware monthly with latest ESPHome.
  # ESPHome releases typically land around the 15th, so we rebuild on the
  # 20th to pick up the new release a few days later after initial fixes.
  schedule:
    - cron: "0 3 20 * *"
  push:
    branches:
      - main
    paths:
      - "CHANGELOG.md"
      - ".github/workflows/**"
      - "watermeterkit-v1/**"
      - "watermeterkit-v2/**"
      - "watermeterkit-v3/**"

permissions:
  contents: write

jobs:
  validate-changelog:
    name: Validate changelog updates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Require changelog update for firmware changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" != "pull_request" && "${{ github.event_name }}" != "push" ]]; then
            echo "Event does not require changelog validation"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "push" && "${{ github.actor }}" == "github-actions[bot]" ]]; then
            echo "Skipping changelog validation for GitHub Actions version bump commit"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA=${{ github.event.pull_request.base.sha }}
            HEAD_SHA=${{ github.event.pull_request.head.sha }}
          else
            BASE_SHA=${{ github.event.before }}
            HEAD_SHA=${{ github.sha }}
          fi

          if [[ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            echo "First push detected; skipping changelog validation"
            exit 0
          fi

          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "Changed files:"
          echo "$CHANGED_FILES"

          if ! echo "$CHANGED_FILES" | grep -Eq '^watermeterkit-v1/.*\.ya?ml$|^watermeterkit-v2/.*\.ya?ml$|^watermeterkit-v3/.*\.ya?ml$'; then
            echo "No firmware YAML changes detected; changelog update not required"
            exit 0
          fi

          if echo "$CHANGED_FILES" | grep -qx 'CHANGELOG.md'; then
            echo "CHANGELOG.md updated"
            exit 0
          fi

          echo "::error file=CHANGELOG.md::Firmware YAML changes require a customer-facing CHANGELOG.md update."
          exit 1

  detect-changes:
    name: Detect changed versions
    needs: [validate-changelog]
    runs-on: ubuntu-latest
    outputs:
      v1_changed: ${{ steps.changes.outputs.v1 }}
      v2_changed: ${{ steps.changes.outputs.v2 }}
      v3_changed: ${{ steps.changes.outputs.v3 }}
      v1_build: ${{ steps.changes.outputs.v1_build }}
      v2_build: ${{ steps.changes.outputs.v2_build }}
      v3_build: ${{ steps.changes.outputs.v3_build }}
      v1_version: ${{ steps.versions.outputs.v1_version }}
      v2_version: ${{ steps.versions.outputs.v2_version }}
      v3_version: ${{ steps.versions.outputs.v3_version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for changes in each version
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.force_all }}" == "true" ]]; then
            echo "Force building all versions"
            echo "v1=true" >> "$GITHUB_OUTPUT"
            echo "v2=true" >> "$GITHUB_OUTPUT"
            echo "v3=true" >> "$GITHUB_OUTPUT"
            echo "v1_build=true" >> "$GITHUB_OUTPUT"
            echo "v2_build=true" >> "$GITHUB_OUTPUT"
            echo "v3_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "Scheduled build - rebuilding all versions with latest ESPHome"
            echo "v1=true" >> "$GITHUB_OUTPUT"
            echo "v2=true" >> "$GITHUB_OUTPUT"
            echo "v3=true" >> "$GITHUB_OUTPUT"
            echo "v1_build=true" >> "$GITHUB_OUTPUT"
            echo "v2_build=true" >> "$GITHUB_OUTPUT"
            echo "v3_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "Tag detected, building all versions"
            echo "v1=true" >> "$GITHUB_OUTPUT"
            echo "v2=true" >> "$GITHUB_OUTPUT"
            echo "v3=true" >> "$GITHUB_OUTPUT"
            echo "v1_build=true" >> "$GITHUB_OUTPUT"
            echo "v2_build=true" >> "$GITHUB_OUTPUT"
            echo "v3_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA=${{ github.event.pull_request.base.sha }}
            HEAD_SHA=${{ github.event.pull_request.head.sha }}
          else
            BASE_SHA=${{ github.event.before }}
            HEAD_SHA=${{ github.sha }}
          fi

          if [[ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            echo "First push detected, building all versions"
            echo "v1=true" >> "$GITHUB_OUTPUT"
            echo "v2=true" >> "$GITHUB_OUTPUT"
            echo "v3=true" >> "$GITHUB_OUTPUT"
            echo "v1_build=true" >> "$GITHUB_OUTPUT"
            echo "v2_build=true" >> "$GITHUB_OUTPUT"
            echo "v3_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "Changed files:"
          echo "$CHANGED_FILES"

          V1_CHANGED=$(echo "$CHANGED_FILES" | grep -Eq "^watermeterkit-v1/.*\.ya?ml$" && echo "true" || echo "false")
          V2_CHANGED=$(echo "$CHANGED_FILES" | grep -Eq "^watermeterkit-v2/.*\.ya?ml$" && echo "true" || echo "false")
          V3_CHANGED=$(echo "$CHANGED_FILES" | grep -Eq "^watermeterkit-v3/.*\.ya?ml$" && echo "true" || echo "false")
          WORKFLOW_CHANGED=$(echo "$CHANGED_FILES" | grep -q "^.github/workflows/" && echo "true" || echo "false")

          if [[ "$WORKFLOW_CHANGED" == "true" ]]; then
            echo "Workflow changes detected; rebuilding all variants while preserving real firmware change detection"
          fi

          echo "v1=$V1_CHANGED" >> "$GITHUB_OUTPUT"
          echo "v2=$V2_CHANGED" >> "$GITHUB_OUTPUT"
          echo "v3=$V3_CHANGED" >> "$GITHUB_OUTPUT"
          if [[ "$WORKFLOW_CHANGED" == "true" ]]; then
            echo "v1_build=true" >> "$GITHUB_OUTPUT"
            echo "v2_build=true" >> "$GITHUB_OUTPUT"
            echo "v3_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "v1_build=$V1_CHANGED" >> "$GITHUB_OUTPUT"
            echo "v2_build=$V2_CHANGED" >> "$GITHUB_OUTPUT"
            echo "v3_build=$V3_CHANGED" >> "$GITHUB_OUTPUT"
          fi
          echo "V1 changed: $V1_CHANGED"
          echo "V2 changed: $V2_CHANGED"
          echo "V3 changed: $V3_CHANGED"

      - name: Update version numbers for changed versions
        id: versions
        shell: bash
        run: |
          set -euo pipefail

          IS_SCHEDULED="${{ github.event_name == 'schedule' }}"

          update_version() {
            local version_file=$1
            local output_name=$2

            if [[ ! -f "$version_file" ]]; then
              echo "${output_name}=1.0" >> "$GITHUB_OUTPUT"
              return
            fi

            current_version=$(grep "software_version:" "$version_file" | head -1 | sed 's/.*: *"\([^"]*\)".*/\1/')
            echo "Current version for $version_file: $current_version"

            if [[ "$IS_SCHEDULED" == "true" ]]; then
              echo "${output_name}=${current_version}" >> "$GITHUB_OUTPUT"
              echo "Scheduled build - keeping version: $current_version"
              return
            fi

            if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
              echo "${output_name}=${current_version}" >> "$GITHUB_OUTPUT"
              echo "Tag build - keeping version: $current_version"
              return
            fi

            if [[ "$current_version" =~ ^([0-9]+)\.([0-9]+)(.*)$ ]]; then
              major="${BASH_REMATCH[1]}"
              minor="${BASH_REMATCH[2]}"
              suffix="${BASH_REMATCH[3]}"
              new_minor=$((minor + 1))
              new_version="${major}.${new_minor}${suffix}"
            else
              shortsha=$(echo "${GITHUB_SHA}" | cut -c1-7)
              new_version="dev-${shortsha}"
            fi

            echo "${output_name}=${new_version}" >> "$GITHUB_OUTPUT"
            echo "New version for $version_file: $new_version"
          }

          if [[ "${{ steps.changes.outputs.v1 }}" == "true" ]]; then
            update_version "watermeterkit-v1/base.yaml" "v1_version"
          else
            v1_current=$(grep "software_version:" "watermeterkit-v1/base.yaml" 2>/dev/null | head -1 | sed 's/.*: *"\([^"]*\)".*/\1/' || echo "1.0")
            echo "v1_version=$v1_current" >> "$GITHUB_OUTPUT"
          fi

          if [[ "${{ steps.changes.outputs.v2 }}" == "true" ]]; then
            update_version "watermeterkit-v2/base.yaml" "v2_version"
          else
            v2_current=$(grep "software_version:" "watermeterkit-v2/base.yaml" 2>/dev/null | head -1 | sed 's/.*: *"\([^"]*\)".*/\1/' || echo "1.0")
            echo "v2_version=$v2_current" >> "$GITHUB_OUTPUT"
          fi

          if [[ "${{ steps.changes.outputs.v3 }}" == "true" ]]; then
            update_version "watermeterkit-v3/base.yaml" "v3_version"
          else
            v3_current=$(grep "software_version:" "watermeterkit-v3/base.yaml" 2>/dev/null | head -1 | sed 's/.*: *"\([^"]*\)".*/\1/' || echo "1.0")
            echo "v3_version=$v3_current" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit version updates and create tags
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail

          create_tag() {
            local tag_name=$1

            if git rev-parse "$tag_name" >/dev/null 2>&1; then
              echo "Tag $tag_name already exists, skipping"
              return
            fi

            echo "Creating tag: $tag_name"
            git tag -a "$tag_name" -m "Release $tag_name"
            git push origin "$tag_name"
          }

          changes_made=false

          if [[ "${{ steps.changes.outputs.v1 }}" == "true" ]]; then
            sed -i "s/^\s*software_version: \".*\"/  software_version: \"${{ steps.versions.outputs.v1_version }}\"/" watermeterkit-v1/base.yaml
            changes_made=true
          fi

          if [[ "${{ steps.changes.outputs.v2 }}" == "true" ]]; then
            sed -i "s/^\s*software_version: \".*\"/  software_version: \"${{ steps.versions.outputs.v2_version }}\"/" watermeterkit-v2/base.yaml
            changes_made=true
          fi

          if [[ "${{ steps.changes.outputs.v3 }}" == "true" ]]; then
            sed -i "s/^\s*software_version: \".*\"/  software_version: \"${{ steps.versions.outputs.v3_version }}\"/" watermeterkit-v3/base.yaml
            changes_made=true
          fi

          if [[ "$changes_made" == "true" ]] && ! git diff --quiet; then
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add watermeterkit-v*/base.yaml

            msg="chore: update versions"
            [[ "${{ steps.changes.outputs.v1 }}" == "true" ]] && msg="$msg V1=${{ steps.versions.outputs.v1_version }}"
            [[ "${{ steps.changes.outputs.v2 }}" == "true" ]] && msg="$msg V2=${{ steps.versions.outputs.v2_version }}"
            [[ "${{ steps.changes.outputs.v3 }}" == "true" ]] && msg="$msg V3=${{ steps.versions.outputs.v3_version }}"
            msg="$msg [skip ci]"

            git commit -m "$msg" || exit 0
            git push || echo "Nothing to push"

            if [[ "${{ steps.changes.outputs.v1 }}" == "true" && ! "${{ steps.versions.outputs.v1_version }}" =~ ^dev- ]]; then
              create_tag "watermeterkit-v1-${{ steps.versions.outputs.v1_version }}"
            fi

            if [[ "${{ steps.changes.outputs.v2 }}" == "true" && ! "${{ steps.versions.outputs.v2_version }}" =~ ^dev- ]]; then
              create_tag "watermeterkit-v2-${{ steps.versions.outputs.v2_version }}"
            fi

            if [[ "${{ steps.changes.outputs.v3 }}" == "true" && ! "${{ steps.versions.outputs.v3_version }}" =~ ^dev- ]]; then
              create_tag "watermeterkit-v3-${{ steps.versions.outputs.v3_version }}"
            fi
          fi

  build-v1:
    name: Build WaterMeterKit V1
    needs: [detect-changes]
    if: needs.detect-changes.outputs.v1_build == 'true'
    uses: ./.github/workflows/esphome-build.yml
    with:
      files: watermeterkit-v1/watermeterkit.yaml
      name: WaterMeterKit V1
      clean: false
      esphome_version: latest
      directory_name: watermeterkit-v1
      software_version: ${{ needs.detect-changes.outputs.v1_version }}
      base_path: watermeterkit-v1

  build-v2:
    name: Build WaterMeterKit V2
    needs: [detect-changes]
    if: needs.detect-changes.outputs.v2_build == 'true'
    uses: ./.github/workflows/esphome-build.yml
    with:
      files: watermeterkit-v2/watermeterkit.yaml
      name: WaterMeterKit V2
      clean: false
      esphome_version: latest
      directory_name: watermeterkit-v2
      software_version: ${{ needs.detect-changes.outputs.v2_version }}
      base_path: watermeterkit-v2

  build-v3:
    name: Build WaterMeterKit V3
    needs: [detect-changes]
    if: needs.detect-changes.outputs.v3_build == 'true'
    uses: ./.github/workflows/esphome-build.yml
    with:
      files: watermeterkit-v3/watermeterkit.yaml
      name: WaterMeterKit V3
      clean: false
      esphome_version: latest
      directory_name: watermeterkit-v3
      software_version: ${{ needs.detect-changes.outputs.v3_version }}
      base_path: watermeterkit-v3

  publish-gh-pages:
    name: Publish firmware to GitHub Pages
    needs:
      - detect-changes
      - build-v1
      - build-v2
      - build-v3
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      github.ref == 'refs/heads/main' &&
      (
        needs.build-v1.result == 'success' ||
        needs.build-v2.result == 'success' ||
        needs.build-v3.result == 'success'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Create output directory
        run: mkdir -p output

      - name: Download V1 artifact
        if: needs.build-v1.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: WaterMeterKit V1
          path: output

      - name: Download V2 artifact
        if: needs.build-v2.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: WaterMeterKit V2
          path: output

      - name: Download V3 artifact
        if: needs.build-v3.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: WaterMeterKit V3
          path: output

      - name: Create manifests
        shell: bash
        run: |
          set -euo pipefail

          create_manifest() {
            local variant_dir=$1
            local manifest_name=$2
            local display_name=$3
            local version=$4
            local manifest_file="output/${variant_dir}/manifest.json"

            if [[ ! -f "$manifest_file" ]]; then
              echo "Skipping ${variant_dir}; manifest.json not found"
              return
            fi

            jq --arg dir "$variant_dir" --arg name "$display_name" --arg version "$version" '{
              "name": $name,
              "version": $version,
              "home_assistant_domain": "esphome",
              "new_install_skip_erase": false,
              "builds": [.]
            } |
            .builds[0].ota.path = ($dir + "/" + .builds[0].ota.path) |
            .builds[0].parts[].path = ($dir + "/" + .builds[0].parts[].path)' \
              "$manifest_file" > "output/${manifest_name}"
          }

          create_manifest "watermeterkit-v1" "watermeterkit-v1-manifest.json" "WaterMeterKit V1" "${{ needs.detect-changes.outputs.v1_version }}"
          create_manifest "watermeterkit-v2" "watermeterkit-v2-manifest.json" "WaterMeterKit V2" "${{ needs.detect-changes.outputs.v2_version }}"
          create_manifest "watermeterkit-v3" "watermeterkit-v3-manifest.json" "WaterMeterKit V3" "${{ needs.detect-changes.outputs.v3_version }}"

      - name: Create README for gh-pages
        shell: bash
        run: |
          cat > output/README.md <<'EOF'
          # WaterMeterKit firmware – GitHub Pages branch (gh-pages)

          This branch hosts the public firmware artifacts and manifests for WaterMeterKit.
          It is served via GitHub Pages and is intended to be consumed by:
          - ESP Web Tools (browser-based flashing)
          - OTA update integrations (using the JSON manifest)

          ## Do not edit manually
          Files in this branch are generated by the CI workflow in the default branch.
          Any manual changes will be overwritten on the next publish.

          ## Layout
          - `watermeterkit-v1/`
          - `watermeterkit-v2/`
          - `watermeterkit-v3/`
          - `*-manifest.json` aggregate manifests for OTA and ESP Web Tools
          EOF

      - name: Debug output structure
        run: find output -maxdepth 2 -type f | sort

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: output
          clean: false
          force: false
          attempt-limit: 6

  create-releases:
    name: Create GitHub releases
    needs: [detect-changes]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      - name: Create releases for changed hardware versions
        shell: bash
        run: |
          set -euo pipefail

          create_release() {
            local tag_name=$1
            local title=$2
            local heading="## [${title}]"

            if gh release view "$tag_name" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              echo "Release $tag_name already exists, skipping"
              return
            fi

            awk -v heading="$heading" '
              $0 == heading { found=1; next }
              found && /^## \[/ { exit }
              found { print }
            ' CHANGELOG.md > release-notes.txt

            if [[ ! -s release-notes.txt ]]; then
              awk '
                $0 == "## [Unreleased]" { found=1; next }
                found && /^## \[/ { exit }
                found { print }
              ' CHANGELOG.md > release-notes.txt
            fi

            if [[ ! -s release-notes.txt ]]; then
              printf '%s\n\n%s\n' \
                "Customer-facing firmware notes live in CHANGELOG.md." \
                "Changelog: https://github.com/${GITHUB_REPOSITORY}/blob/main/CHANGELOG.md" \
                > release-notes.txt
            fi

            gh release create "$tag_name" \
              -R "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "$title" \
              --notes-file release-notes.txt
          }

          if [[ "${{ needs.detect-changes.outputs.v1_changed }}" == "true" && ! "${{ needs.detect-changes.outputs.v1_version }}" =~ ^dev- ]]; then
            create_release "watermeterkit-v1-${{ needs.detect-changes.outputs.v1_version }}" "WaterMeterKit V1 ${{ needs.detect-changes.outputs.v1_version }}"
          fi

          if [[ "${{ needs.detect-changes.outputs.v2_changed }}" == "true" && ! "${{ needs.detect-changes.outputs.v2_version }}" =~ ^dev- ]]; then
            create_release "watermeterkit-v2-${{ needs.detect-changes.outputs.v2_version }}" "WaterMeterKit V2 ${{ needs.detect-changes.outputs.v2_version }}"
          fi

          if [[ "${{ needs.detect-changes.outputs.v3_changed }}" == "true" && ! "${{ needs.detect-changes.outputs.v3_version }}" =~ ^dev- ]]; then
            create_release "watermeterkit-v3-${{ needs.detect-changes.outputs.v3_version }}" "WaterMeterKit V3 ${{ needs.detect-changes.outputs.v3_version }}"
          fi
