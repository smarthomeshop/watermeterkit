# WaterMeterKit V3 - Base Configuration
# ESP32-C6 with 4MB flash

substitutions:
  # Product identification
  device_name: watermeterkit
  friendly_name: WaterMeterKit
  software_version: "2.5"
  hardware_version: "V3"
  wifi_update_manifest_url: "https://smarthomeshop.github.io/watermeterkit/watermeterkit-v3-manifest.json"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: true
  project:
    name: "smarthomeshop.watermeterkit"
    version: ${software_version}
  on_boot:
    - priority: -100
      then:
        - lambda: |-
            id(water_pulse_offset) = 0.0;
            id(water_meter_initial).publish_state(id(water_total_persistent));
        - component.update: sensor_water_meter_total
  on_shutdown:
    priority: -100
    then:
      - lambda: |-
          if (!id(sensor_pulse_meter_total).has_state() || isnan(id(sensor_pulse_meter_total).state)) {
            ESP_LOGW("water", "Skipping shutdown save: water pulse total unavailable");
            return;
          }

          float pulses_since_offset = id(sensor_pulse_meter_total).state - id(water_pulse_offset);
          if (pulses_since_offset > 0) {
            id(water_total_persistent) += pulses_since_offset;
            id(water_pulse_offset) = id(sensor_pulse_meter_total).state;
            ESP_LOGI("water", "Water total saved on shutdown: %.3f m³", id(water_total_persistent));
          }

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf
  flash_size: 4MB

preferences:
  flash_write_interval: 30min

globals:
  - id: water_total_persistent
    type: float
    restore_value: true
    initial_value: "0.0"

  - id: water_pulse_offset
    type: float
    restore_value: false
    initial_value: "0.0"

interval:
  - interval: 5min
    then:
      - lambda: |-
          if (!id(sensor_pulse_meter_total).has_state() || isnan(id(sensor_pulse_meter_total).state)) {
            ESP_LOGV("water", "Skipping periodic save: water pulse total unavailable");
            return;
          }

          float pulses_since_offset = id(sensor_pulse_meter_total).state - id(water_pulse_offset);
          if (pulses_since_offset >= 0.05) {
            id(water_total_persistent) += pulses_since_offset;
            id(water_pulse_offset) = id(sensor_pulse_meter_total).state;
            ESP_LOGI("water", "Water total saved to flash: %.3f m³ (+%.3f m³)", id(water_total_persistent), pulses_since_offset);
          }

# === Core Components ===
logger:
  baud_rate: 115200
  hardware_uart: UART0

api:

wifi:
  # No WiFi credentials are embedded in the firmware.
  # Users can onboard with:
  # - Captive Portal via the fallback AP
  # - Improv Serial over USB
  # - Improv BLE
  ap:
    ssid: ${device_name}
    password: ${device_name}

captive_portal:

esp32_improv:
  authorizer: none

improv_serial:

ota:
  - platform: esphome
    id: ota_esphome
  - platform: http_request
    id: ota_http_request

web_server:
  port: 80

# === Device Controls ===
switch:
  - platform: restart
    id: switch_restart
    name: "${friendly_name} Restart"

button:
  - platform: factory_reset
    id: button_factory_reset
    name: "${friendly_name} Factory Reset"
    entity_category: config
    disabled_by_default: true

number:
  - platform: template
    id: water_meter_initial
    name: "${friendly_name} Water Meter Initial Value"
    icon: "mdi:water-plus"
    unit_of_measurement: "m³"
    device_class: water
    entity_category: config
    optimistic: true
    min_value: 0
    max_value: 100000
    step: 0.001
    mode: box
    set_action:
      then:
        - lambda: |-
            id(water_total_persistent) = x;
            if (id(sensor_pulse_meter_total).has_state() && !isnan(id(sensor_pulse_meter_total).state)) {
              id(water_pulse_offset) = id(sensor_pulse_meter_total).state;
            } else {
              id(water_pulse_offset) = 0.0;
            }
            global_preferences->sync();
            id(sensor_water_meter_total).update();
            ESP_LOGI("water", "Water meter initial value saved immediately: %.3f m³", x);

# === Status LED ===
status_led:
  pin: GPIO1

# === LED Outputs ===
output:
  - platform: ledc
    id: output_led_green
    pin: GPIO0

  - platform: ledc
    id: output_led_blue
    pin: GPIO7

light:
  - platform: monochromatic
    id: light_led_green
    internal: true
    output: output_led_green

  - platform: monochromatic
    id: light_led_blue
    internal: true
    output: output_led_blue

# === I2C Bus ===
i2c:
  sda: GPIO5
  scl: GPIO4
  scan: true

# === Time ===
time:
  - platform: homeassistant
    id: time_homeassistant
    on_time_sync:
      then:
        - component.update: sensor_uptime_timestamp

http_request:
  useragent: watermeterkit-esphome

update:
  - platform: http_request
    id: firmware_update
    name: "${friendly_name} Firmware"
    source: ${wifi_update_manifest_url}

# === Sensors ===
sensor:
  - platform: wifi_signal
    id: sensor_wifi_signal
    name: "${friendly_name} WiFi Signal"
    update_interval: 60s

  # Uptime
  - platform: uptime
    id: sensor_uptime
    name: "${friendly_name} Uptime Seconds"
    internal: true

  # Boot timestamp / uptime timestamp
  - platform: template
    id: sensor_uptime_timestamp
    name: "${friendly_name} Uptime"
    device_class: timestamp
    accuracy_decimals: 0
    update_interval: never
    lambda: |-
      if (!id(time_homeassistant).now().is_valid()) {
        return {};
      }
      return id(time_homeassistant).now().timestamp - id(sensor_uptime).state;

  # === Pulse Meter (Water Flow Sensor) ===
  - platform: pulse_meter
    id: sensor_pulse_meter
    name: "${friendly_name} Current Usage"
    icon: mdi:water-pump
    unit_of_measurement: "L/min"
    accuracy_decimals: 1
    timeout: 2min
    internal_filter: 200ms
    internal_filter_mode: PULSE
    pin:
      number: GPIO6
      mode:
        input: true
        pullup: true
    filters:
      - multiply: 1.0
    total:
      id: sensor_pulse_meter_total
      name: "${friendly_name} Total Consumption"
      icon: mdi:cube-outline
      unit_of_measurement: "m³"
      state_class: total_increasing
      device_class: water
      accuracy_decimals: 3
      filters:
        - multiply: 0.001
    on_value:
      then:
        - light.turn_on:
            id: light_led_green
            brightness: 100%
        - delay: 1s
        - light.turn_off: light_led_green
        - component.update: sensor_water_meter_total

  - platform: template
    id: sensor_water_meter_total
    name: "${friendly_name} Water Meter Total"
    icon: "mdi:water-check"
    unit_of_measurement: "m³"
    state_class: total_increasing
    device_class: water
    accuracy_decimals: 3
    update_interval: 60s
    lambda: |-
      if (!id(sensor_pulse_meter_total).has_state() || isnan(id(sensor_pulse_meter_total).state)) {
        return id(water_total_persistent);
      }

      float current_delta = id(sensor_pulse_meter_total).state - id(water_pulse_offset);
      if (current_delta < 0.0) {
        current_delta = 0.0;
      }

      return id(water_total_persistent) + current_delta;

  # === HDC1080 Temperature & Humidity Sensor ===
  - platform: hdc1080
    temperature:
      id: sensor_temperature
      name: "${friendly_name} Temperature"
      filters:
        - offset: -5.5
    humidity:
      id: sensor_humidity
      name: "${friendly_name} Humidity"
      filters:
        - offset: 12.0
    update_interval: 60s

# === Text Sensors ===
text_sensor:
  - platform: wifi_info
    ip_address:
      id: wifi_ip_address
      name: "${friendly_name} IP Address"
      entity_category: diagnostic
      disabled_by_default: true
    mac_address:
      id: wifi_mac_address
      name: "${friendly_name} MAC Address"
      entity_category: diagnostic
      disabled_by_default: true

  - platform: version
    id: text_sensor_version
    name: "${friendly_name} ESPHome Version"

  - platform: template
    id: text_sensor_watermeterkit_software_version
    name: "${friendly_name} Software Version"
    update_interval: 5h
    lambda: |-
      return {"${software_version}"};

  - platform: template
    id: text_sensor_watermeterkit_hardware_version
    name: "${friendly_name} Hardware Version"
    update_interval: 5h
    lambda: |-
      return {"${hardware_version}"};
