# WaterMeterKit V3 - WiFi Network Configuration

wifi:
  ap:
    ssid: ${device_name}

captive_portal:

esp32_improv:
  authorizer: none

improv_serial:

sensor:
  - platform: wifi_signal
    id: sensor_wifi_signal
    name: "${friendly_name} WiFi Signal"
    update_interval: 60s

text_sensor:
  - platform: wifi_info
    ip_address:
      id: wifi_ip_address
      name: "${friendly_name} IP Address"
      entity_category: diagnostic
      disabled_by_default: true
    mac_address:
      id: wifi_mac_address
      name: "${friendly_name} MAC Address"
      entity_category: diagnostic
      disabled_by_default: true
